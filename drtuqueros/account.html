<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Dr.Tuquero's</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sj4.css">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <a href="index.html"><img src="Untitled_design2.png" width="125px" alt="Dr. Tuquero's"></a>
            </div>
            <nav>
                <ul id="MenuItems">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Boots</a></li>
                    <li><a href="sale.html">Sale</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="account.html">Account</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
            <img src="menu.png" class="menu-icon" onclick="menutoggle()" alt="Menu">
        </div>
    </div>

    <div class="small-container account-page">
        <div class="row">
            <div class="col-2">
                <img src="docs.png" width="100%" alt="Boots">
            </div>
            <div class="col-2">
                <div class="form-container">

                    <div id="ProfileView" style="display: none;">
                        <h2 style="margin-bottom: 20px;">User Profile</h2>
                        <div class="profile-card">
                            <p><strong>Username:</strong> <span id="prof-user">---</span></p>
                            <p><strong>Email:</strong> <span id="prof-email">---</span></p>
                            <p><strong>Member Status:</strong> <span style="color: #d1b000; font-weight: bold;">Verified Rebel</span></p>
                        </div>
                        <a href="cart.html" class="btn" style="background: #333; color: #fff; font-size: 12px;">View My Cart</a>
                        <br>
                        <button type="button" class="btn logout-btn" onclick="logout()">Logout Account</button>
                    </div>

                    <div id="AuthBox">
                        <div class="form-btn">
                            <span onclick="login()">Login</span>
                            <span onclick="register()">Register</span>
                            <hr id="Indicator">
                        </div>
                        <form id="LoginForm">
                            <input type="text" placeholder="Username" required>
                            <input type="password" placeholder="Password" required>
                            <button type="submit" class="btn">Login</button>
                            <p><a href="#">Forgot Password</a></p>
                        </form>
                        <form id="RegForm">
                            <input type="text" placeholder="Username" required>
                            <input type="email" placeholder="Email" required>
                            <input type="password" placeholder="Password" required>
                            <button type="submit" class="btn">Register</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>Copyright 2026 - Dr.Tuquero's Alternative Footwear</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dr.Tuquero's</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sj4.css">
</head>
<body>
    <div class="container">
        <div class="navbar">
            <div class="logo">
                <a href="index.html"><img src="Untitled_design2.png" width="125px" alt="Dr. Tuquero's"></a>
            </div>
            <nav>
                <ul id="MenuItems">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Boots</a></li>
                    <li><a href="sale.html">Sale</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="account.html">Account</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </nav>
            <img src="menu.png" class="menu-icon" onclick="menutoggle()" alt="Menu">
        </div>
    </div>

    <div class="small-container">
        <h2 class="title">Get In Touch</h2>
        <div class="row contact-row">
            <div class="contact-col">
                <form id="ContactForm" class="contact-form">
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
            <div class="contact-col address-info">
                <h4>Our Headquarters</h4>
                <p>123 Rebellion Way<br>Alternative District<br>City Center, 4000</p>
                <br>
                <h4>Email</h4>
                <p>support@tuqueroboots.com</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p>Copyright 2026 - Dr.Tuquero's Alternative Footwear</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
